syntax = "proto3";

package libops.v1.options;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/libops/proto/libops/v1/options;optionsv1";

// Extend MethodOptions to mark RPCs that the dashboard assistant playground may call.
extend google.protobuf.MethodOptions {
  bool assistant_playground = 50003;
}
