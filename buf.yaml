version: v2
modules:
  - path: .
deps:
  - buf.build/googleapis/googleapis
  - buf.build/gnostic/gnostic
lint:
  use:
    - STANDARD
  except:
    - ENUM_VALUE_PREFIX
    - PACKAGE_VERSION_SUFFIX
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
  ignore_unstable_packages: true
